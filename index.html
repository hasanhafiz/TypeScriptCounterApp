<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="header-title">Counter App</h1>
            <p class="header-subtitle">using TypeScript </p>
        </div>
    </header>

    <main class="container">
        <div id="counter" class="row g-4">
            <div class="col-12">
                <!-- add a inline span in the middle of a div container  -->
                <span id="counterValue" class="d-block text-center fs-1 mb-3">0</span>

                <!-- <input type="text" id="counterValue" class="form-control mb-3 text-center fs-1" value="0" readonly> -->
                <!-- add 3 button, Increment, Decrement and Reset -->
                <div class="d-flex justify-content-center gap-3">
                    <button id="incrementBtn" class="btn btn-primary">Increment</button>
                    <button id="decrementBtn" class="btn btn-secondary">Decrement</button>
                    <button id="resetBtn" class="btn btn-danger">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-5">
        <div class="container text-center">
            <p class="text-muted mb-0">Counter Demo using TypeScript with Explanation</p>
        </div>
    </footer>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    <script type="module" src="./dist/script.js"></script>
</body>

</html>
